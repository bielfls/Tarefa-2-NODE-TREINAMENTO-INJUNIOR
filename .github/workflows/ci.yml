name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Variável de ambiente dummy necessária pra executar a geração de tipos do Prisma:
  DUMMY_DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'


    - name: Cache Prisma Engine
      uses: actions/cache@v4
      with:
        path: ~/.cache/prisma
        key: ${{ runner.os }}-prisma-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-prisma-


    - name: Install dependencies
      run: npm ci


    - name: Generate Prisma Client
      env:
        DATABASE_URL: ${{ env.DUMMY_DATABASE_URL }}
      run: npx prisma generate


    - name: Run Linter
      run: npm run lint


    - name: Run Type Checking
      run: npx tsc --noEmit


    - name: Build project
      env:
        DATABASE_URL: ${{ env.DUMMY_DATABASE_URL }}
      run: npm run build